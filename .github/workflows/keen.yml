name: automobile

on:
  push:

jobs:
  primarily:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        floor: ["impossible", "limited", "workshop", "crash", "reliability"]
        solid: ["opera", "fish", "resist", "adjust"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar ZN.jar
